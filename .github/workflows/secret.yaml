name: secret-workflow

on:
  push:

jobs:
  use-secret:
    runs-on: ubuntu-latest

    env:
      MY_SECRET: ${{ secrets.SECRET }}

    steps:
      - name: Safely use secret
        run: |
          if [ -n "$MY_SECRET" ]; then
            echo "Secret loaded successfully"
          fi

      - name: Print escaped secret reference
        run: echo "The secret is \${{ secrets.SECRET }}"
